{% extends "base.html" %}

{% block title %}Sign In – Privacy ROPA Solution{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.png') }}"
                        alt="logo" height="70" class="mb-3">
                    <h4 class="fw-bold">Privacy ROPA Solution</h4>
                    <p class="text-muted small">Sign in to your account</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control" id="email" name="email" required autofocus>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="card border-primary bg-primary bg-opacity-10">
                            <div class="card-body py-2 px-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="consent" name="consent" required>
                                    <label class="form-check-label small" for="consent">
                                        I consent to using this ROPA Solution for managing processing activities
                                        and understand that my login activity will be logged for compliance purposes.
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary fw-semibold" id="loginBtn" disabled>
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </div>
                </form>

                <script>
                document.getElementById('consent').addEventListener('change', function() {
                    document.getElementById('loginBtn').disabled = !this.checked;
                });
                </script>

                <div class="text-center mb-3">
                    <a href="{{ url_for('forgot_password') }}" class="text-muted small text-decoration-none">
                        <i class="fas fa-key me-1"></i>Forgot your password?
                    </a>
                </div>

                <hr>

                <div class="text-center">
                    <p class="text-muted small mb-2">Don't have an account?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary w-100">
                        <i class="fas fa-rocket me-2"></i>Start Free Trial
                    </a>
                </div>

                <div class="text-center mt-3">
                    <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i>Back to home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
